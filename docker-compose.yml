services:
  postgres:
    image: postgres:18
    container_name: otherworlds-rpg-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-otherworlds}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-otherworlds}
      POSTGRES_DB: ${POSTGRES_DB:-otherworlds}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otherworlds"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: otherworlds-rpg-api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-otherworlds}:${POSTGRES_PASSWORD:-otherworlds}@postgres:5432/${POSTGRES_DB:-otherworlds}
      HOST: 0.0.0.0
      PORT: 3000
      RUST_LOG: ${RUST_LOG:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://api:3000
        PUBLIC_APP_NAME: Otherworlds RPG
    container_name: otherworlds-rpg-web
    environment:
      PORT: 4173
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "${WEB_PORT:-4173}:4173"
    depends_on:
      - api
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otherworlds-rpg-otel-collector
    volumes:
      - ./infra/telemetry/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"
      - "4318:4318"

  tempo:
    image: grafana/tempo:2.7.2
    container_name: otherworlds-rpg-tempo
    volumes:
      - ./infra/telemetry/tempo-config.yaml:/etc/tempo.yaml
      - tempo_data:/var/tempo
    command: ["-config.file=/etc/tempo.yaml"]

  loki:
    image: grafana/loki:latest
    container_name: otherworlds-rpg-loki
    volumes:
      - ./infra/telemetry/loki-config.yaml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]

  prometheus:
    image: prom/prometheus:latest
    container_name: otherworlds-rpg-prometheus
    volumes:
      - ./infra/telemetry/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:latest
    container_name: otherworlds-rpg-grafana
    volumes:
      - ./infra/telemetry/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3001:3000"
    depends_on:
      - tempo
      - loki
      - prometheus

volumes:
  postgres_data:
  tempo_data:
  loki_data:
  prometheus_data:
  grafana_data:
